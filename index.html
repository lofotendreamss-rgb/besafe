      <script>
        (function() {
          // Splash: rodyti numatytąją kalbą, typewriter, mygtukai
          var supportedLangs = ["de", "en", "es", "fr", "it", "lt", "no", "pl", "pt", "sv", "ru", "uk", "zh", "ja"];
          var defaultLang = "lt";
          try {
            var saved = localStorage.getItem("besafe_lang");
            if (saved && supportedLangs.indexOf(saved) !== -1) defaultLang = saved;
          } catch(e) {}

          // Pridėti is-visible klasę teisingos kalbos elementams
          var splashEls = document.querySelectorAll("[data-splash-lang]");
          for (var i = 0; i < splashEls.length; i++) {
            if (splashEls[i].getAttribute("data-splash-lang") === defaultLang) {
              splashEls[i].classList.add("is-visible");
            } else {
              splashEls[i].classList.remove("is-visible");
            }
          }

          // Typewriter efektas
          setTimeout(function() {
            var phrase = document.querySelector(".splash__phrase.is-visible");
            if (!phrase) return;
            var text = phrase.getAttribute("data-text") || "";
            if (!text) return;

            phrase.textContent = "";
            var cursor = document.createElement("span");
            cursor.className = "splash__cursor";
            phrase.appendChild(cursor);

            var idx = 0;
            var timer = setInterval(function() {
              if (!cursor.parentNode) { clearInterval(timer); return; }
              if (idx < text.length) {
                cursor.parentNode.insertBefore(document.createTextNode(text[idx]), cursor);
                idx++;
              } else {
                clearInterval(timer);
                setTimeout(function() {
                  cursor.classList.add("splash__cursor--hidden");
                  setTimeout(function() { cursor.remove(); }, 300);
                }, 1000);
              }
            }, 120);
          }, 500);

          // Kalbos mygtukai
          var langBtns = document.querySelectorAll(".splash__lang-btn[data-lang]");
          var startBtn = document.getElementById("splash-start");

          for (var j = 0; j < langBtns.length; j++) {
            langBtns[j].addEventListener("click", function() {
              for (var k = 0; k < langBtns.length; k++) {
                langBtns[k].classList.remove("is-selected");
              }
              this.classList.add("is-selected");

              var lang = this.getAttribute("data-lang");
              var els = document.querySelectorAll("[data-splash-lang]");
              for (var m = 0; m < els.length; m++) {
                if (els[m].getAttribute("data-splash-lang") === lang) {
                  els[m].classList.add("is-visible");
                } else {
                  els[m].classList.remove("is-visible");
                }
              }

              // Išvalyti visas frazes
              var allPhrases = document.querySelectorAll(".splash__phrase");
              for (var n = 0; n < allPhrases.length; n++) {
                allPhrases[n].textContent = "";
              }
              // Užpildyti pasirinktos kalbos frazę
              var newPhrase = document.querySelector('.splash__phrase[data-splash-lang="' + lang + '"]');
              if (newPhrase) {
                newPhrase.textContent = newPhrase.getAttribute("data-text") || "";
              }

              if (startBtn) startBtn.disabled = false;
            });
          }

          // Pradėti mygtukas — dispatch event kurį app.js pagauna
          if (startBtn) {
            startBtn.addEventListener("click", function() {
              if (startBtn.disabled) return;
              startBtn.disabled = true;

              var selectedBtn = document.querySelector(".splash__lang-btn.is-selected");
              var selectedLang = selectedBtn ? selectedBtn.getAttribute("data-lang") : defaultLang;

              // Išsaugoti kalbą
              try {
                localStorage.setItem("besafe_lang", selectedLang);
                localStorage.setItem("besafe:language", selectedLang);
              } catch(e) {}

              // Fade out
              var splashRoot = document.getElementById("splash-root");
              if (splashRoot) {
                splashRoot.style.transition = "opacity 0.5s ease-out";
                splashRoot.style.opacity = "0";
              }

              // Nustatyti global flag kurį app.js perskaitys kai bus pasiruošęs
              window.__besafe_splash_done = selectedLang;
            });
          }

        })();
      </script>

  <script type="module">
    import {
      createTranslator,
      getCurrentLanguage,
      setCurrentLanguage,
      getSupportedLanguages,
    } from "./js/core/i18n.js";

    (function syncShellLanguage() {
      const SUPPORTED = Array.isArray(getSupportedLanguages?.())
        ? getSupportedLanguages()
        : ["en", "lt"];

      function normalizeLanguage(value) {
        const normalized = String(value || "").trim().toLowerCase();
        return SUPPORTED.includes(normalized) ? normalized : null;
      }

      function resolveLanguage() {
        try {
          const current = normalizeLanguage(getCurrentLanguage?.());
          if (current) return current;
        } catch {}

        try {
          const primary = normalizeLanguage(localStorage.getItem("besafe_lang"));
          if (primary) return primary;

          const legacy = normalizeLanguage(localStorage.getItem("besafe:language"));
          if (legacy) return legacy;
        } catch {}

        return normalizeLanguage(document.documentElement.lang) || "en";
      }

      function syncLanguageState(lang) {
        const normalized = normalizeLanguage(lang) || "en";

        try {
          localStorage.setItem("besafe_lang", normalized);
        } catch {}

        try {
          localStorage.setItem("besafe:language", normalized);
        } catch {}

        try {
          setCurrentLanguage(normalized);
        } catch {}

        document.documentElement.lang = normalized;

        return normalized;
      }

      function getTranslator(lang) {
        return createTranslator(lang);
      }

      function applyShellCopy(lang) {
        const t = getTranslator(lang);

        const languageTitle = document.getElementById("language-title");
        const languageDescription = document.getElementById("language-description");
        const languagePromise = document.getElementById("language-promise");

        const pageTitle = document.getElementById("page-title");
        const pageSubtitle = document.getElementById("page-subtitle");

        const pageHome = document.getElementById("page-home");
        const pageAdvisor = document.getElementById("page-advisor");
        const pageTransactions = document.getElementById("page-transactions");
        const pageReports = document.getElementById("page-reports");
        const pagePlaces = document.getElementById("page-places");
        const pageCategories = document.getElementById("page-categories");

        const appNav = document.getElementById("app-nav");
        const navHome = document.getElementById("nav-home");
        const navTransactions = document.getElementById("nav-transactions");
        const navAdvisor = document.getElementById("nav-advisor");
        const navReports = document.getElementById("nav-reports");
        const navPlaces = document.getElementById("nav-places");
        const navCategories = document.getElementById("nav-categories");
        const navSettings = document.getElementById("nav-settings");
        const navLanguage = document.getElementById("nav-language");

        const appLanguageSwitch = document.getElementById("app-language-switch");

        const langEn = document.getElementById("lang-en");
        const langLt = document.getElementById("lang-lt");


        if (languageDescription) {
          languageDescription.textContent = t(
            "language.screen.description",
            "BeSafe helps you understand your financial situation calmly and clearly."
          );
        }

        if (languagePromise) {
          languagePromise.textContent = t(
            "language.screen.promise",
            "Precise information, a calm tone, and one clear next step — without pressure and without guesswork."
          );
        }

        if (pageTitle) {
          pageTitle.textContent = t("app.home", "Home");
        }

        if (pageSubtitle) {
          pageSubtitle.textContent = t(
            "app.subtitle.home",
            "A calm and clear overview of your financial situation."
          );
        }

        if (pageHome) {
          pageHome.setAttribute("aria-label", t("app.home", "Home"));
        }

        if (pageAdvisor) {
          pageAdvisor.setAttribute(
            "aria-label",
            t("app.advisor", "Financial calculations")
          );
        }

        if (pageTransactions) {
          pageTransactions.setAttribute("aria-label", t("app.transactions", "Transactions"));
        }

        if (pageReports) {
          pageReports.setAttribute("aria-label", t("app.reports", "Reports"));
        }

        if (pagePlaces) {
          pagePlaces.setAttribute("aria-label", t("app.places", "Places"));
        }

        if (pageCategories) {
          pageCategories.setAttribute(
            "aria-label",
            t("app.categories", "Categories")
          );
        }

        if (appNav) {
          appNav.setAttribute("aria-label", t("home.shortcuts.aria", "Primary navigation"));
        }

        if (navHome) {
          navHome.textContent = t("app.home", "Home");
          navHome.setAttribute(
            "aria-label",
            t("navigation.open.home", "Open Home page")
          );
        }

        if (navTransactions) {
          navTransactions.textContent = t("app.transactions", "Transactions");
          navTransactions.setAttribute(
            "aria-label",
            t("navigation.open.transactions", "Open Transactions page")
          );
        }

        if (navAdvisor) {
          navAdvisor.textContent = t("app.advisor", "Financial calculations");
          navAdvisor.setAttribute(
            "aria-label",
            t("navigation.open.advisor", "Open Financial Calculations page")
          );
        }

        if (navReports) {
          navReports.textContent = t("app.reports", "Reports");
          navReports.setAttribute(
            "aria-label",
            t("navigation.open.reports", "Open Reports page")
          );
        }

        if (navPlaces) {
          navPlaces.textContent = t("app.places", "Places");
          navPlaces.setAttribute(
            "aria-label",
            t("navigation.open.places", "Open Places page")
          );
        }

        if (navCategories) {
          navCategories.textContent = t("app.categories", "Categories");
          navCategories.setAttribute(
            "aria-label",
            t("navigation.open.categories", "Open Categories page")
          );
        }

        if (navSettings) {
          navSettings.textContent = t("app.settings", "Settings");
          navSettings.setAttribute(
            "aria-label",
            t("navigation.open.settings", "Open Settings page")
          );
        }

        if (navLanguage) {
          navLanguage.textContent = t(
            "advisor.topActions.languageLabel",
            "Language"
          );
          navLanguage.setAttribute(
            "aria-label",
            t("advisor.topActions.languageAria", "Open language selection")
          );
          navLanguage.setAttribute(
            "title",
            t("advisor.topActions.languageLabel", "Language")
          );
        }

        if (appLanguageSwitch) {
          appLanguageSwitch.textContent = t(
            "advisor.topActions.languageLabel",
            "Language"
          );
          appLanguageSwitch.setAttribute(
            "aria-label",
            t("advisor.topActions.languageAria", "Open language selection")
          );
          appLanguageSwitch.setAttribute(
            "title",
            t("advisor.topActions.languageLabel", "Language")
          );
        }

        if (langEn) {
          langEn.textContent = t("language.option.en", "English");
          langEn.setAttribute(
            "aria-label",
            t("language.option.en.aria", "Choose English language")
          );
        }

        if (langLt) {
          langLt.textContent = t("language.option.lt", "Lietuvių");
          langLt.setAttribute(
            "aria-label",
            t("language.option.lt.aria", "Choose Lithuanian language")
          );
        }

        const legalPrivacy = document.getElementById("legal-footer-privacy");
        const legalTerms = document.getElementById("legal-footer-terms");
        const legalDisclaimer = document.getElementById("legal-footer-disclaimer");

        if (legalPrivacy) {
          legalPrivacy.textContent = t("legal.privacy", "Privacy");
        }
        if (legalTerms) {
          legalTerms.textContent = t("legal.terms", "Terms");
        }
        if (legalDisclaimer) {
          legalDisclaimer.textContent = t(
            "legal.langDisclaimer",
            "Currently available in English only"
          );
        }
      }

      function refreshShellFromCurrentLanguage(event) {
        const eventLang = event?.detail?.language;
        const lang = eventLang
          ? syncLanguageState(eventLang)
          : syncLanguageState(resolveLanguage());
        applyShellCopy(lang);
      }

      function dispatchLanguageChanged(lang) {
        window.dispatchEvent(
          new CustomEvent("besafe:language-changed", {
            detail: { language: lang },
          })
        );

        window.dispatchEvent(
          new CustomEvent("language:changed", {
            detail: { language: lang },
          })
        );
      }

      function handleLanguageSelection(event) {
        const button = event.target.closest("[data-lang]");
        if (!button) return;

        const nextLanguage = normalizeLanguage(button.dataset.lang);
        if (!nextLanguage) return;

        const appliedLanguage = syncLanguageState(nextLanguage);
        applyShellCopy(appliedLanguage);
        dispatchLanguageChanged(appliedLanguage);
      }

      function bindLanguageButtons() {
        document.removeEventListener("click", handleLanguageSelection, true);
        document.addEventListener("click", handleLanguageSelection, true);
      }

      function bindLanguageRefreshEvents() {
        window.removeEventListener(
          "besafe:language-changed",
          refreshShellFromCurrentLanguage
        );
        window.removeEventListener(
          "language:changed",
          refreshShellFromCurrentLanguage
        );

        window.addEventListener(
          "besafe:language-changed",
          refreshShellFromCurrentLanguage
        );
        window.addEventListener(
          "language:changed",
          refreshShellFromCurrentLanguage
        );
      }

      /* ---- Splash: is-visible + typewriter + mygtukai ---- */

      function updateSplashLang(lang) {
        document.querySelectorAll("[data-splash-lang]").forEach((el) => {
          el.classList.toggle("is-visible", el.dataset.splashLang === lang);
        });
      }

      function startTypewriter() {
        let phrase = document.querySelector(".splash__phrase.is-visible");
        if (!phrase) {
          phrase = document.querySelector('.splash__phrase[data-splash-lang="lt"]');
          if (phrase) phrase.classList.add("is-visible");
        }
        if (!phrase) return;

        const text = phrase.dataset.text || "";
        if (!text) return;

        phrase.textContent = "";
        const cursor = document.createElement("span");
        cursor.className = "splash__cursor";
        phrase.appendChild(cursor);

        let i = 0;
        const interval = setInterval(() => {
          if (i < text.length) {
            cursor.before(text[i]);
            i++;
          } else {
            clearInterval(interval);
            setTimeout(() => {
              cursor.classList.add("splash__cursor--hidden");
              setTimeout(() => cursor.remove(), 300);
            }, 1000);
          }
        }, 120);
      }

      function initSplashButtons() {
        const langBtns = document.querySelectorAll(".splash__lang-btn[data-lang]");
        const startBtn = document.getElementById("splash-start");

        langBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            langBtns.forEach((b) => b.classList.remove("is-selected"));
            btn.classList.add("is-selected");
            updateSplashLang(btn.dataset.lang);
            if (startBtn) startBtn.disabled = false;
          });
        });
      }

      function start() {
        const lang = syncLanguageState(resolveLanguage());
        applyShellCopy(lang);
        updateSplashLang(lang);
        bindLanguageButtons();
        bindLanguageRefreshEvents();
        initSplashButtons();
        setTimeout(startTypewriter, 500);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start, { once: true });
      } else {
        start();
      }
    })();
  </script>

  <script>
    (function() {
      var modal = document.getElementById("lang-modal");
      if (!modal) return;

      function getActiveLang() {
        try { return localStorage.getItem("besafe_lang") || "lt"; } catch(e) { return "lt"; }
      }

      function markActive() {
        var lang = getActiveLang();
        var opts = modal.querySelectorAll("[data-lang-select]");
        for (var i = 0; i < opts.length; i++) {
          if (opts[i].getAttribute("data-lang-select") === lang) {
            opts[i].classList.add("is-active");
          } else {
            opts[i].classList.remove("is-active");
          }
        }
      }

      // Atidaryti modalą — global funkcija kurią navigation.controller kviečia
      window.__openLanguageModal = function() {
        markActive();
        modal.classList.add("is-open");
      };

      // Uždaryti
      function closeModal() {
        modal.classList.remove("is-open");
      }

      // Uždaryti paspaudus overlay arba X
      var closeBtns = modal.querySelectorAll("[data-lang-modal-close]");
      for (var i = 0; i < closeBtns.length; i++) {
        closeBtns[i].addEventListener("click", closeModal);
      }

      // Escape
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && modal.classList.contains("is-open")) {
          closeModal();
        }
      });

      // Kalbos pasirinkimas
      var langOpts = modal.querySelectorAll("[data-lang-select]");
      for (var j = 0; j < langOpts.length; j++) {
        langOpts[j].addEventListener("click", function() {
          var lang = this.getAttribute("data-lang-select");
          var currentLang = getActiveLang();
          if (lang === currentLang) {
            closeModal();
            return;
          }

          // Išsaugoti kalbą
          try {
            localStorage.setItem("besafe_lang", lang);
            localStorage.setItem("besafe:language", lang);
          } catch(e) {}

          document.documentElement.lang = lang;

          // Pažymėti aktyvią
          markActive();

          // Uždaryti modalą
          closeModal();

          // Dispatch event — app.js ir navigation.controller pagaus
          window.dispatchEvent(new CustomEvent("besafe:language-changed", {
            detail: { language: lang }
          }));

          // Perkrauti aktyvų puslapį
          var app = window.__app;
          if (app && typeof app.syncLanguageState === "function") {
            try { app.syncLanguageState(lang); } catch(e) {}
          }
          if (app && typeof app.rerenderActivePage === "function") {
            app.rerenderActivePage().catch(function(e) {
              console.error("[LangModal] rerenderActivePage failed:", e);
            });
          }
        });
      }
    })();
  </script>
